# /etc/nginx/sites-available/agradex.com
# Bağban AI at agradex.com root. /api → FastAPI (127.0.0.1:8000), else → Next.js (127.0.0.1:3000).
# Obtain TLS: sudo certbot --nginx -d agradex.com -d www.agradex.com

server {
    listen 80;
    server_name agradex.com www.agradex.com;
    return 301 https://agradex.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.agradex.com;
    ssl_certificate     /etc/letsencrypt/live/agradex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agradex.com/privkey.pem;
    return 301 https://agradex.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name agradex.com;

    ssl_certificate     /etc/letsencrypt/live/agradex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agradex.com/privkey.pem;

    client_max_body_size 15m;   # photo uploads (backend caps at 12MB)

    # API → FastAPI backend (keeps the auth cookie same-origin)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
