# HTTP-only origin vhost for agradex.com — TLS is terminated at the Cloudflare edge
# (proxied A records). Origin listens on :80 only; app ports stay bound to 127.0.0.1.
# For end-to-end encryption later, switch to nginx-agradex.conf + a Cloudflare Origin
# Certificate (Full/strict).
server {
    listen 80;
    listen [::]:80;
    server_name agradex.com www.agradex.com;

    client_max_body_size 15m;   # photo uploads (backend caps at 12MB)

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
